{% extends 'base_landing.html' %}

{% block meta %}
  <title>Password changed - PageFresh</title>
{% endblock meta %}

{% block content %}
  <section class="pf-shell flex min-h-[calc(100dvh-4rem)] items-center justify-center py-12">
    <div class="pf-panel w-full max-w-md p-6 text-center sm:p-8">
      <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-xl bg-[color:var(--pf-brand-soft)] text-lg font-bold text-[color:var(--pf-brand-dark)]">PF</div>
      <h1 class="mt-6 text-3xl font-semibold text-[color:var(--pf-ink)]">Password changed</h1>
      <p class="mt-4 text-sm leading-6 text-[color:var(--pf-muted)]">
        You can now sign in with your new password.
      </p>
      <a href="{% url 'account_login' %}" class="pf-button-primary mt-8">Sign in</a>
    </div>
  </section>
{% endblock content %}
