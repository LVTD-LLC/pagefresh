{% extends 'base_app.html' %}

{% block meta %}
  <title>Sign out - PageFresh</title>
{% endblock meta %}

{% block content %}
  <section class="pf-shell flex min-h-[calc(100dvh-4rem)] items-center justify-center py-12">
    <div class="pf-panel w-full max-w-md p-6 text-center sm:p-8">
      <h1 class="text-3xl font-semibold text-[color:var(--pf-ink)]">Sign out?</h1>
      <p class="mt-3 text-sm leading-6 text-[color:var(--pf-muted)]">You can sign back in any time.</p>
      <form method="post" action="{% url 'account_logout' %}" class="mt-8">
        {% csrf_token %}
        {% if redirect_field_value %}
          <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
        {% endif %}
        <button class="inline-flex items-center justify-center rounded-xl bg-red-700 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2 active:translate-y-px" type="submit">
          Sign out
        </button>
      </form>
    </div>
  </section>
{% endblock content %}
