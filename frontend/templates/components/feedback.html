<div data-controller="feedback" class="fixed bottom-3 right-3 z-50 md:bottom-6 md:right-6">
  <button
    data-feedback-target="toggleButton"
    data-action="click->feedback#toggleFeedback"
    class="flex h-12 w-12 items-center justify-center rounded-2xl bg-[color:var(--pf-brand-dark)] text-sm font-bold text-white shadow-md transition hover:bg-[color:var(--pf-ink)] focus:outline-none focus:ring-2 focus:ring-[color:var(--pf-brand)] focus:ring-offset-2"
    aria-label="Provide feedback"
  >
    PF
  </button>

  <div
    data-feedback-target="overlay"
    data-action="click->feedback#closeIfClickedOutside"
    class="pointer-events-none fixed inset-0 z-40 flex items-center justify-center bg-[color:var(--pf-ink)]/50 opacity-0 transition-opacity duration-200"
  >
    <div
      data-feedback-target="formContainer"
      class="pf-panel mx-4 w-full max-w-md scale-95 p-6 transition-transform duration-200"
    >
      <h3 class="text-xl font-semibold text-[color:var(--pf-ink)]">Share feedback</h3>
      <p class="mt-2 text-sm leading-6 text-[color:var(--pf-muted)]">Tell us what would make PageFresh easier to use.</p>

      <form data-action="submit->feedback#submitFeedback" class="mt-5">
        {% csrf_token %}
        <div>
          <label for="feedback-message" class="pf-label">Feedback</label>
          <textarea
            id="feedback-message"
            data-feedback-target="feedbackInput"
            class="pf-input mt-1"
            rows="4"
            placeholder="What should we improve?"
            required
          ></textarea>
        </div>

        <div class="mt-5 flex justify-end gap-3">
          <button type="button" data-action="click->feedback#closeFeedback" class="pf-button-secondary">
            Cancel
          </button>
          <button type="submit" class="pf-button-primary">
            Send feedback
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
