{% if not email_verified %}
<div class="pf-warning-banner mb-6">
  <div class="grid gap-3 sm:grid-cols-[1fr_auto] sm:items-center">
    <div>
      <h2 class="pf-warning-title text-sm font-semibold">Confirm your email</h2>
      <p class="pf-warning-text mt-1 text-sm leading-6">
        Email confirmation is required before every PageFresh feature is available.
      </p>
    </div>
    <form method="post" action="{{ resend_confirmation_url }}">
      {% csrf_token %}
      <button type="submit" class="pf-warning-action">
        Resend confirmation
      </button>
    </form>
  </div>
</div>
{% endif %}
